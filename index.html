<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>UltraTribe AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh}

    #splash{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    #splash.hidden{display:none}
    .brand-ring{width:110px;height:110px;border-radius:50%;border:3px solid transparent;background:conic-gradient(from 0deg,#ff00ff,#ff6600,#ffff00,#00ff88,#00cfff,#ff00ff) border-box;-webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:spinRing 3s linear infinite}
    @keyframes spinRing{to{transform:rotate(360deg)}}
    .brand-logo{font-size:26px;font-weight:900;letter-spacing:.35em;text-transform:uppercase;background:linear-gradient(135deg,#ff00ff,#ff6600,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand-tagline{font-size:10px;letter-spacing:.45em;color:#555;text-transform:uppercase}
    #start-btn{margin-top:8px;padding:13px 38px;border:1px solid #ff00ff;background:transparent;color:#ff00ff;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;border-radius:2px}
    #start-btn:active{background:#ff00ff30}

    #loader{position:fixed;inset:0;z-index:90;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
    #loader.active{display:flex}
    .loader-bar-wrap{width:220px;height:3px;background:#222;border-radius:2px;overflow:hidden}
    .loader-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff00ff,#ff6600);transition:width .6s ease;box-shadow:0 0 10px #ff00ff}
    .loader-text{font-size:13px;letter-spacing:.25em;color:#ccc;text-transform:uppercase;font-weight:600}

    #hint{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:50;display:none;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
    #hint.active{display:flex}
    .hint-frame{width:150px;height:150px;position:relative}
    .hint-frame::before,.hint-frame::after,.hint-frame span::before,.hint-frame span::after{content:'';position:absolute;width:22px;height:22px;border-color:#ff00ff;border-style:solid;opacity:.7;animation:cornerPulse 2s ease-in-out infinite}
    .hint-frame::before{top:0;left:0;border-width:2px 0 0 2px}
    .hint-frame::after{top:0;right:0;border-width:2px 2px 0 0}
    .hint-frame span::before{bottom:0;left:0;border-width:0 0 2px 2px}
    .hint-frame span::after{bottom:0;right:0;border-width:0 2px 2px 0}
    @keyframes cornerPulse{0%,100%{opacity:.35}50%{opacity:1;box-shadow:0 0 8px #ff00ff}}
    .hint-text{font-size:11px;letter-spacing:.35em;color:#aaa;text-transform:uppercase}

    #found-flash{position:fixed;inset:0;z-index:40;background:radial-gradient(circle,#ff00ff28 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity .3s}
    #found-flash.active{opacity:1}

    #arrow-btn{
      position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
      z-index:9999;display:none;
      width:60px;height:60px;border-radius:50%;
      border:2px solid #ff00ff;background:rgba(0,0,0,0.75);
      cursor:pointer;align-items:center;justify-content:center;
      box-shadow:0 0 20px #ff00ff88,0 0 40px #ff00ff44;
      transition:box-shadow .3s;
      pointer-events:all!important;touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }
    #arrow-btn.active{display:flex}
    #arrow-btn:active{box-shadow:0 0 30px #ff00ffcc}
    #arrow-btn svg{transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
    #arrow-btn.wf-open svg{transform:rotate(180deg)}

    a-scene{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:1}
  </style>
</head>
<body>

<a-scene
  id="ar-scene"
  mindar-image="imageTargetSrc: target.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false">
    <!-- Waterfall plane parented to camera -- always fills screen -->
    <a-entity id="waterfall-entity" position="0 0 -0.5" waterfall-shader visible="false"></a-entity>
  </a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane width="1" height="1" material="opacity:0;transparent:true;side:double" position="0 0 0"></a-plane>
    <a-entity id="psyche-layer"    position="0 0 0.01"  psychedelic-overlay></a-entity>
    <a-entity id="particle-ring-1" position="0 0 0.02"  orb-ring="radius:0.35;count:40;speed:0.6;hue:300;orbSize:0.028"></a-entity>
    <a-entity id="particle-ring-2" position="0 0 0.02"  orb-ring="radius:0.55;count:28;speed:0.4;hue:30;orbSize:0.036;reverse:true"></a-entity>
    <a-entity id="geo-spinner"     position="0 0 0.015" sacred-geo></a-entity>
    <a-entity id="aura-disc"       position="0 0 0.005" aura-glow></a-entity>
  </a-entity>
</a-scene>

<div id="splash">
  <div class="brand-ring"></div>
  <div class="brand-logo">UltraTribe</div>
  <div class="brand-tagline">Wear the Vision</div>
  <button id="start-btn" onclick="startAR()">Activate AR</button>
</div>

<div id="loader">
  <div class="brand-logo" style="font-size:16px">UltraTribe</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-text">Starting camera...</div>
</div>

<div id="hint"><div class="hint-frame"><span></span></div><div class="hint-text">Point at the shirt</div></div>
<div id="found-flash"></div>

<button id="arrow-btn">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <polyline points="6,9 12,15 18,9" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script>
// ── Waterfall Shader -- camera-parented fullscreen plane ──────────────────────
AFRAME.registerComponent('waterfall-shader', {
  init() {
    // Size the plane to fill the camera FOV at z=-0.5
    // Default A-Frame FOV is 80deg. At distance 0.5:
    // half-height = 0.5 * tan(40deg) = 0.42, width = height * aspect
    const aspect = window.innerWidth / window.innerHeight;
    const h = 2 * 0.5 * Math.tan(40 * Math.PI / 180);
    const w = h * aspect;

    const mat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      depthTest: false,
      side: THREE.FrontSide,
      uniforms: {
        time:       { value: 0 },
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        slideY:     { value: -1.0 }, // -1 = fully above screen, 0 = fully visible
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        precision highp float;
        uniform float time;
        uniform vec2  resolution;
        uniform float slideY;
        varying vec2 vUv;

        const float PI  = 3.141592654;
        const float TAU = 6.283185307;

        float ray_issphere4(vec3 ro, vec3 rd, float ra) {
          float r2=ra*ra;
          vec3 d2=rd*rd,d3=d2*rd,o2=ro*ro,o3=o2*ro;
          float ka=1./dot(d2,d2),
                k3=ka*dot(ro,d3),k2=ka*dot(o2,d2),
                k1=ka*dot(o3,rd),k0=ka*(dot(o2,o2)-r2*r2),
                c2=k2-k3*k3,
                c1=k1+2.*k3*k3*k3-3.*k3*k2,
                c0=k0-3.*k3*k3*k3*k3+6.*k3*k3*k2-4.*k3*k1,
                p=c2*c2+c0/3.,q=c2*c2*c2-c2*c0+c1*c1,h=q*q-p*p*p;
          if(h<0.) return -1.;
          float sh=sqrt(h),
                s=sign(q+sh)*pow(abs(q+sh),1./3.),
                t2=sign(q-sh)*pow(abs(q-sh),1./3.);
          vec2 w=vec2(s+t2,s-t2),v=vec2(w.x+c2*4.,w.y*sqrt(3.))*.5;
          float r=length(v);
          return abs(v.y)/sqrt(r+v.x)-c1/r-k3;
        }

        float hash(vec2 co){ return fract(sin(dot(co,vec2(12.9898,58.233)))*13758.5453); }
        float hash(float co){ return fract(sin(co*12.9898)*13758.5453); }
        float dot2(vec2 p){ return dot(p,p); }

        vec3 lines(vec3 F,vec3 P,float A,float AA,float T){
          const float N=4.;
          vec2 Z0=vec2(5e-3,TAU/6.),Z1=.2*Z0;
          for(float j=0.;j<N;++j){
            vec3 p=P; p.x+=Z0.x*j/N;
            float h0=hash(vec2(floor(p.x/Z0.x+.5),j)),h1=fract(8667.*h0),a=A-T*(1.+h0);
            vec2 q=vec2(p.x,a),n=floor(vec2(p.x,a)/Z0+.5),q0,q1,d;
            q-=n*Z0; q0=q-vec2(0.,Z1.y); q1=q;
            q1.y=max(abs(q1.y)-Z1.y,0.);
            d=vec2(length(q0),length(q1))-Z1.x;
            vec4 c=.5*(1.+sin(.1*T+TAU*h1+vec4(0.,1.,8.,4.)));
            vec3 b=c.xyz*c.w;
            F+=exp(19.*(q.y-Z1.y))*smoothstep(AA,-AA,d.y)*b;
            F+=smoothstep(AA,-AA,d.x-.5*Z1.x)*sqrt(.5*(b-min(0.,d.x-.5*Z1.x)));
          }
          return F;
        }

        vec3 stars(vec3 F,vec3 P,float A,float AA,float T){
          vec2 Z0=vec2(.1,TAU/6.);
          vec3 p=P; p.x+=.123;
          float h0=hash(vec2(floor(p.x/Z0.x+.5),0.)),h1=fract(8667.*h0),a=A-T*(1.5+h0);
          vec2 q=vec2(p.x,a),n=floor(vec2(p.x,a)/Z0+.5),dq;
          q-=n*Z0;
          dq=vec2(dFdx(q.x),dFdy(q.y));
          vec3 c=.5*(1.+sin(7.*T+TAU*h1+vec3(2.,1.,0.)))*hash(.123*n.x+floor(T*121.));
          F+=c.xyz*7e-6/max(dot2(vec2(dq.y/max(dq.x,1e-6),1.)*q),1e-6);
          return F;
        }

        void main() {
          // Slide: vUv.y goes 0 (bottom) to 1 (top)
          // slideY: -1 means plane is above screen, 0 means fully visible
          float adjustedY = vUv.y + slideY;
          if (adjustedY < 0.0 || adjustedY > 1.0) {
            gl_FragColor = vec4(0.0);
            return;
          }

          vec2 C = vec2(vUv.x, adjustedY) * resolution;
          vec2 R = resolution;
          vec3 RO = vec3(0.,-1.9,0.);
          vec3 RD = normalize(vec3(C-.5*R, sqrt(2.)*R.y));
          vec3 F = 3e-4*vec3(1.,4.,40.)/(dot2(vec2(sqrt(.5),1.).yx*((C+C-R)/R.x-vec2(0.,R.y/R.x)))+2e-3);
          float Z = ray_issphere4(RO,RD,2.);
          float T = 0.07*time+123.;
          vec3 P = Z*RD+RO;
          float A = atan(P.z,P.y);
          float AA = sqrt(2.)*length(vec2(dFdx(P.x),dFdy(A)));
          F = lines(F,P,A,AA,T);
          F = stars(F,P,A,AA,T);
          F *= 4.; F -= 2e-2*vec3(2.,3.,1.);
          F = tanh(F); F = max(F,0.); F = sqrt(F)-.05;

          // Brightness-based alpha -- blacks become transparent
          float brightness = dot(F, vec3(0.299,0.587,0.114));
          float alpha = min(brightness * 0.85, 0.80);

          gl_FragColor = vec4(F, alpha);
        }
      `,
    });

    const geo = new THREE.PlaneGeometry(w, h);
    const mesh = new THREE.Mesh(geo, mat);
    this.el.setObject3D('mesh', mesh);
    this.mat = mat;
    this.slideY = -1.0;  // start fully above
    this.targetSlideY = -1.0;
    this.startTime = performance.now();
    this.isVisible = false;
  },

  tick() {
    if (!this.mat) return;
    this.mat.uniforms.time.value = (performance.now() - this.startTime) / 1000;

    // Animate slideY
    this.slideY += (this.targetSlideY - this.slideY) * 0.08;
    this.mat.uniforms.slideY.value = this.slideY;
  },

  show() {
    this.el.setAttribute('visible', true);
    this.isVisible = true;
    this.targetSlideY = 0.0;
  },

  hide() {
    this.targetSlideY = -1.0;
    this.isVisible = false;
    // Hide entity after slide-out completes
    const self = this;
    setTimeout(() => {
      if (!self.isVisible) self.el.setAttribute('visible', false);
    }, 800);
  }
});

// ── Shaded Orb Ring ───────────────────────────────────────────────────────────
AFRAME.registerComponent('orb-ring', {
  schema: { radius:{default:.4}, count:{default:36}, speed:{default:.5}, hue:{default:280}, orbSize:{default:.028}, reverse:{default:false} },
  init() {
    this.group = new THREE.Group();
    this.el.setObject3D('mesh', this.group);
    this.visible = false; this.group.visible = false; this.orbs = [];
    const { count, radius, hue, orbSize } = this.data;
    const lightDir = new THREE.Vector3(1,1,2).normalize();
    for (let i = 0; i < count; i++) {
      const angle = (i/count)*Math.PI*2, r = radius*(.7+Math.random()*.6);
      const h = ((hue+(Math.random()-.5)*80)/360);
      const size = orbSize*(.7+Math.random()*.6);
      const mat = new THREE.ShaderMaterial({
        transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
        uniforms:{ time:{value:0}, baseHue:{value:h}, lightDir:{value:lightDir}, opacity:{value:0} },
        vertexShader:`
          varying vec3 vNormal,vViewDir;
          void main(){
            vNormal=normalize(normalMatrix*normal);
            vec4 mv=modelViewMatrix*vec4(position,1.);
            vViewDir=normalize(-mv.xyz);
            gl_Position=projectionMatrix*mv;
          }`,
        fragmentShader:`
          uniform float time,baseHue,opacity;
          uniform vec3 lightDir;
          varying vec3 vNormal,vViewDir;
          vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}
          void main(){
            float hue=mod(baseHue+time*.05,1.);
            vec3 base=hsv2rgb(vec3(hue,.9,1.));
            float diff=max(dot(vNormal,lightDir),0.);
            vec3 h2=normalize(lightDir+vViewDir);
            float spec=pow(max(dot(vNormal,h2),0.),32.);
            float fres=pow(1.-max(dot(vNormal,vViewDir),0.),3.);
            vec3 col=base*(.2+.7*diff)+vec3(1.)*spec*.8+base*fres*1.2;
            gl_FragColor=vec4(col,opacity*(1.-fres*.3));
          }`
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(size,16,16), mat);
      mesh.position.set(Math.cos(angle)*r, Math.sin(angle)*r, 0);
      this.orbs.push({mesh,mat,angle,r,phase:Math.random()*Math.PI*2,speed:.5+Math.random()*1.5});
      this.group.add(mesh);
    }
    this.targetOpacity=0; this.currentOpacity=0;
  },
  tick(t){
    if(!this.visible&&this.currentOpacity<.01)return;
    const time=t/1000; const dir=this.data.reverse?-1:1;
    this.currentOpacity+=(this.targetOpacity-this.currentOpacity)*.05;
    this.orbs.forEach(o=>{
      const ang=o.angle+time*this.data.speed*dir*.3;
      const drift=Math.sin(time*o.speed+o.phase)*.06;
      o.mesh.position.set(Math.cos(ang)*(o.r+drift),Math.sin(ang)*(o.r+drift),Math.sin(time*o.speed*.5+o.phase)*.04);
      const pu=.5+.5*Math.sin(time*o.speed*2+o.phase);
      const s=.85+pu*.3; o.mesh.scale.set(s,s,s);
      o.mat.uniforms.time.value=time;
      o.mat.uniforms.opacity.value=this.currentOpacity*(.6+pu*.4);
    });
  },
  show(){this.visible=true;this.group.visible=true;this.targetOpacity=1;},
  hide(){this.visible=false;this.targetOpacity=0;}
});

// ── Psychedelic Overlay ───────────────────────────────────────────────────────
AFRAME.registerComponent('psychedelic-overlay',{
  init(){
    const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,
      uniforms:{time:{value:0},opacity:{value:0}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`
        uniform float time,opacity;varying vec2 vUv;
        vec3 hsv(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}
        float rip(vec2 uv,float t,float f,float ph){return sin(length(uv-.5)*f-t*2.+ph)*.5+.5;}
        void main(){
          float t=time*.6;
          float r1=rip(vUv,t,18.,0.),r2=rip(vUv,t*1.3,12.,2.1),r3=rip(vUv,t*.7,24.,4.2);
          vec2 c=vUv-.5;float ang=atan(c.y,c.x)+t*.4;float rad=length(c);
          float sw=sin(ang*6.+rad*12.-t*1.5)*.5+.5;
          vec3 col=hsv(vec3(mod(r1*.4+r2*.3+sw*.3+t*.08,1.),.9+r3*.1,.7+sw*.3));
          gl_FragColor=vec4(col,smoothstep(.5,.35,rad)*opacity*.55);
        }`});
    this.mat=mat;this.opacity=0;this.targetOpacity=0;
    this.el.setObject3D('mesh',new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat));
  },
  tick(t){if(!this.mat)return;this.mat.uniforms.time.value=t/1000;this.opacity+=(this.targetOpacity-this.opacity)*.05;this.mat.uniforms.opacity.value=this.opacity;},
  show(){this.targetOpacity=1;},hide(){this.targetOpacity=0;}
});

// ── Sacred Geo ────────────────────────────────────────────────────────────────
AFRAME.registerComponent('sacred-geo',{
  init(){
    this.group=new THREE.Group();this.el.setObject3D('mesh',this.group);
    this.visible=false;this.group.visible=false;this.rings=[];
    [{sides:3,r:.38,hue:.83,speed:.18,dir:1},{sides:6,r:.44,hue:.08,speed:.25,dir:-1},
     {sides:3,r:.50,hue:.55,speed:.14,dir:1},{sides:6,r:.57,hue:.16,speed:.20,dir:-1}].forEach((cfg)=>{
      const pts=[];
      for(let j=0;j<=cfg.sides;j++){const a=(j/cfg.sides)*Math.PI*2-Math.PI/2;pts.push(Math.cos(a)*cfg.r,Math.sin(a)*cfg.r,0);}
      const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
      const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
        uniforms:{time:{value:0},baseHue:{value:cfg.hue},opacity:{value:0}},
        vertexShader:`void main(){gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader:`uniform float time,baseHue,opacity;vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}void main(){float hue=mod(baseHue+time*.04,1.);float pulse=.5+.5*sin(time*1.3);vec3 col=hsv2rgb(vec3(hue,1.,1.));gl_FragColor=vec4(col,opacity*(.5+.5*pulse));}`});
      const line=new THREE.Line(geo,mat);
      this.rings.push({line,mat,dir:cfg.dir,speed:cfg.speed});this.group.add(line);
    });
    this.targetOpacity=0;this.currentOpacity=0;
  },
  tick(t){
    if(!this.visible&&this.currentOpacity<.01)return;
    const time=t/1000;this.currentOpacity+=(this.targetOpacity-this.currentOpacity)*.05;
    this.rings.forEach(r=>{r.line.rotation.z=time*r.speed*r.dir;r.mat.uniforms.time.value=time;r.mat.uniforms.opacity.value=this.currentOpacity;});
  },
  show(){this.visible=true;this.group.visible=true;this.targetOpacity=1;},
  hide(){this.visible=false;this.targetOpacity=0;}
});

// ── Aura Glow ─────────────────────────────────────────────────────────────────
AFRAME.registerComponent('aura-glow',{
  init(){
    const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
      uniforms:{time:{value:0}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform float time;varying vec2 vUv;void main(){vec2 c=vUv-.5;float d=length(c);float pu=.5+.5*sin(time*1.2);float glow=smoothstep(.5,0.,d)*.35*pu;float h=mod(time*.1,1.);float r=abs(h*6.-3.)-1.;float g=2.-abs(h*6.-2.);float b=2.-abs(h*6.-4.);gl_FragColor=vec4(clamp(vec3(r,g,b),0.,1.)*glow,glow);}`});
    this.mat=mat;this.visible=false;
    this.mesh=new THREE.Mesh(new THREE.PlaneGeometry(1.3,1.3),mat);
    this.mesh.visible=false;this.el.setObject3D('mesh',this.mesh);
  },
  tick(t){if(this.visible)this.mat.uniforms.time.value=t/1000;},
  show(){this.visible=true;this.mesh.visible=true;},
  hide(){this.visible=false;this.mesh.visible=false;}
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function showEffects(){
  ['psyche-layer','particle-ring-1','particle-ring-2','geo-spinner','aura-disc'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const c=el.components['psychedelic-overlay']||el.components['orb-ring']||el.components['sacred-geo']||el.components['aura-glow'];
    if(c)c.show();
  });
  const f=document.getElementById('found-flash');f.classList.add('active');
  setTimeout(()=>f.classList.remove('active'),600);
  document.getElementById('hint').classList.remove('active');
}

function hideEffects(){
  ['psyche-layer','particle-ring-1','particle-ring-2','geo-spinner','aura-disc'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    const c=el.components['psychedelic-overlay']||el.components['orb-ring']||el.components['sacred-geo']||el.components['aura-glow'];
    if(c)c.hide();
  });
  document.getElementById('hint').classList.add('active');
}

// ── Waterfall toggle ──────────────────────────────────────────────────────────
let waterfallOpen = false;
const btn = document.getElementById('arrow-btn');

function toggleWaterfall(){
  waterfallOpen = !waterfallOpen;
  const wf = document.getElementById('waterfall-entity');
  const comp = wf.components['waterfall-shader'];
  if(waterfallOpen){ comp.show(); btn.classList.add('wf-open'); }
  else             { comp.hide(); btn.classList.remove('wf-open'); }
}

btn.addEventListener('click',    toggleWaterfall);
btn.addEventListener('touchend', e=>{ e.preventDefault(); toggleWaterfall(); }, {passive:false});

// ── AR lifecycle ──────────────────────────────────────────────────────────────
const sceneEl = document.getElementById('ar-scene');

sceneEl.addEventListener('arReady', () => {
  document.getElementById('loader').classList.remove('active');
  document.getElementById('hint').classList.add('active');
  btn.classList.add('active');
  // Disable pointer events on A-Frame canvas so HTML button receives touches
  const afc = sceneEl.querySelector('canvas');
  if(afc) afc.style.pointerEvents = 'none';
});

sceneEl.addEventListener('targetFound', showEffects);
sceneEl.addEventListener('targetLost',  hideEffects);

function startAR(){
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('loader').classList.add('active');
  document.getElementById('loader-bar').style.width = '60%';
  sceneEl.systems['mindar-image-system'].start();
}
</script>
</body>
</html>
