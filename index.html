<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>UltraTribe AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#000;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh}
    #splash{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
    #splash.hidden{display:none}
    .brand-ring{width:110px;height:110px;border-radius:50%;border:3px solid transparent;background:conic-gradient(from 0deg,#ff00ff,#ff6600,#ffff00,#00ff88,#00cfff,#ff00ff) border-box;-webkit-mask:linear-gradient(#000 0 0) padding-box,linear-gradient(#000 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:spinRing 3s linear infinite}
    @keyframes spinRing{to{transform:rotate(360deg)}}
    .brand-logo{font-size:26px;font-weight:900;letter-spacing:.35em;text-transform:uppercase;background:linear-gradient(135deg,#ff00ff,#ff6600,#ffff00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand-tagline{font-size:10px;letter-spacing:.45em;color:#555;text-transform:uppercase}
    #start-btn{margin-top:8px;padding:13px 38px;border:1px solid #ff00ff;background:transparent;color:#ff00ff;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;border-radius:2px}
    #start-btn:active{background:#ff00ff30}
    #loader{position:fixed;inset:0;z-index:90;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
    #loader.active{display:flex}
    .loader-bar-wrap{width:220px;height:3px;background:#222;border-radius:2px;overflow:hidden}
    .loader-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff00ff,#ff6600);transition:width .6s ease;box-shadow:0 0 10px #ff00ff}
    .loader-text{font-size:13px;letter-spacing:.25em;color:#ccc;text-transform:uppercase;font-weight:600}
    #hint{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:50;display:none;flex-direction:column;align-items:center;gap:10px;pointer-events:none}
    #hint.active{display:flex}
    .hint-frame{width:150px;height:150px;position:relative}
    .hint-frame::before,.hint-frame::after,.hint-frame span::before,.hint-frame span::after{content:'';position:absolute;width:22px;height:22px;border-color:#ff00ff;border-style:solid;opacity:.7;animation:cornerPulse 2s ease-in-out infinite}
    .hint-frame::before{top:0;left:0;border-width:2px 0 0 2px}
    .hint-frame::after{top:0;right:0;border-width:2px 2px 0 0}
    .hint-frame span::before{bottom:0;left:0;border-width:0 0 2px 2px}
    .hint-frame span::after{bottom:0;right:0;border-width:0 2px 2px 0}
    @keyframes cornerPulse{0%,100%{opacity:.35}50%{opacity:1;box-shadow:0 0 8px #ff00ff}}
    .hint-text{font-size:11px;letter-spacing:.35em;color:#aaa;text-transform:uppercase}
    #found-flash{position:fixed;inset:0;z-index:40;background:radial-gradient(circle,#ff00ff28 0%,transparent 70%);opacity:0;pointer-events:none;transition:opacity .3s}
    #found-flash.active{opacity:1}
    a-scene{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:1}
  </style>
</head>
<body>

<a-scene
  id="ar-scene"
  mindar-image="imageTargetSrc: target.mind; maxTrack: 2; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Shirt 1: psychedelic experience -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane width="1" height="1" material="opacity:0;transparent:true;side:double" position="0 0 0"></a-plane>
    <a-entity position="0 0 0.01"  psychedelic-overlay></a-entity>
    <a-entity position="0 0 0.02"  orb-ring="radius:0.35;count:40;speed:0.6;hue:300;orbSize:0.028"></a-entity>
    <a-entity position="0 0 0.02"  orb-ring="radius:0.55;count:28;speed:0.4;hue:30;orbSize:0.036;reverse:true"></a-entity>
    <a-entity position="0 0 0.015" sacred-geo></a-entity>
    <a-entity position="0 0 0.005" aura-glow></a-entity>
  </a-entity>

  <!-- Shirt 2: waterfall experience -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-plane width="1" height="1" material="opacity:0;transparent:true;side:double" position="0 0 0"></a-plane>
    <a-entity position="0 0 0.01" waterfall-overlay></a-entity>
  </a-entity>
</a-scene>

<div id="splash">
  <div class="brand-ring"></div>
  <div class="brand-logo">UltraTribe</div>
  <div class="brand-tagline">Wear the Vision</div>
  <button id="start-btn" onclick="startAR()">Activate AR</button>
</div>
<div id="loader">
  <div class="brand-logo" style="font-size:16px">UltraTribe</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-text">Starting camera...</div>
</div>
<div id="hint"><div class="hint-frame"><span></span></div><div class="hint-text">Point at the shirt</div></div>
<div id="found-flash"></div>

<script>
// All effects run continuously -- MindAR handles entity show/hide natively
// when the target is found or lost. No manual show/hide needed.

AFRAME.registerComponent('psychedelic-overlay',{
  init(){
    const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,
      uniforms:{time:{value:0}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform float time;varying vec2 vUv;vec3 hsv(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}float rip(vec2 uv,float t,float f,float ph){return sin(length(uv-.5)*f-t*2.+ph)*.5+.5;}void main(){float t=time*.6;float r1=rip(vUv,t,18.,0.),r2=rip(vUv,t*1.3,12.,2.1),r3=rip(vUv,t*.7,24.,4.2);vec2 c=vUv-.5;float ang=atan(c.y,c.x)+t*.4;float rad=length(c);float sw=sin(ang*6.+rad*12.-t*1.5)*.5+.5;vec3 col=hsv(vec3(mod(r1*.4+r2*.3+sw*.3+t*.08,1.),.9+r3*.1,.7+sw*.3));gl_FragColor=vec4(col,smoothstep(.5,.35,rad)*.55);}`});
    this.mat=mat;
    this.el.setObject3D('mesh',new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat));
  },
  tick(t){if(this.mat)this.mat.uniforms.time.value=t/1000;}
});

AFRAME.registerComponent('orb-ring',{
  schema:{radius:{default:.4},count:{default:36},speed:{default:.5},hue:{default:280},orbSize:{default:.028},reverse:{default:false}},
  init(){
    this.group=new THREE.Group();this.el.setObject3D('mesh',this.group);this.orbs=[];
    const{count,radius,hue,orbSize}=this.data;
    const ld=new THREE.Vector3(1,1,2).normalize();
    for(let i=0;i<count;i++){
      const angle=(i/count)*Math.PI*2,r=radius*(.7+Math.random()*.6);
      const h=((hue+(Math.random()-.5)*80)/360),size=orbSize*(.7+Math.random()*.6);
      const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
        uniforms:{time:{value:0},baseHue:{value:h},ld:{value:ld}},
        vertexShader:`varying vec3 vN,vV;void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.);vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;}`,
        fragmentShader:`uniform float time,baseHue;uniform vec3 ld;varying vec3 vN,vV;vec3 hsv(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}void main(){float hue=mod(baseHue+time*.05,1.);vec3 base=hsv(vec3(hue,.9,1.));float diff=max(dot(vN,ld),0.);vec3 h2=normalize(ld+vV);float spec=pow(max(dot(vN,h2),0.),32.);float fres=pow(1.-max(dot(vN,vV),0.),3.);vec3 col=base*(.2+.7*diff)+vec3(1.)*spec*.8+base*fres*1.2;gl_FragColor=vec4(col,1.-fres*.3);}`});
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,16,16),mat);
      mesh.position.set(Math.cos(angle)*r,Math.sin(angle)*r,0);
      this.orbs.push({mesh,mat,angle,r,phase:Math.random()*Math.PI*2,speed:.5+Math.random()*1.5});
      this.group.add(mesh);
    }
  },
  tick(t){
    const time=t/1000,dir=this.data.reverse?-1:1;
    this.orbs.forEach(o=>{
      const ang=o.angle+time*this.data.speed*dir*.3,drift=Math.sin(time*o.speed+o.phase)*.06;
      o.mesh.position.set(Math.cos(ang)*(o.r+drift),Math.sin(ang)*(o.r+drift),Math.sin(time*o.speed*.5+o.phase)*.04);
      const pu=.5+.5*Math.sin(time*o.speed*2+o.phase),s=.85+pu*.3;
      o.mesh.scale.set(s,s,s);
      o.mat.uniforms.time.value=time;
    });
  }
});

AFRAME.registerComponent('sacred-geo',{
  init(){
    this.group=new THREE.Group();this.el.setObject3D('mesh',this.group);this.rings=[];
    [{sides:3,r:.38,hue:.83,speed:.18,dir:1},{sides:6,r:.44,hue:.08,speed:.25,dir:-1},
     {sides:3,r:.50,hue:.55,speed:.14,dir:1},{sides:6,r:.57,hue:.16,speed:.20,dir:-1}].forEach(cfg=>{
      const pts=[];
      for(let j=0;j<=cfg.sides;j++){const a=(j/cfg.sides)*Math.PI*2-Math.PI/2;pts.push(Math.cos(a)*cfg.r,Math.sin(a)*cfg.r,0);}
      const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
      const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
        uniforms:{time:{value:0},baseHue:{value:cfg.hue}},
        vertexShader:`void main(){gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader:`uniform float time,baseHue;vec3 hsv2rgb(vec3 c){vec4 K=vec4(1.,2./3.,1./3.,3.);vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);}void main(){float hue=mod(baseHue+time*.04,1.);float pulse=.5+.5*sin(time*1.3);vec3 col=hsv2rgb(vec3(hue,1.,1.));gl_FragColor=vec4(col,.5+.5*pulse);}`});
      const line=new THREE.Line(geo,mat);
      this.rings.push({line,mat,dir:cfg.dir,speed:cfg.speed});this.group.add(line);
    });
  },
  tick(t){
    const time=t/1000;
    this.rings.forEach(r=>{r.line.rotation.z=time*r.speed*r.dir;r.mat.uniforms.time.value=time;});
  }
});

AFRAME.registerComponent('aura-glow',{
  init(){
    const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
      uniforms:{time:{value:0}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform float time;varying vec2 vUv;void main(){vec2 c=vUv-.5;float d=length(c);float pu=.5+.5*sin(time*1.2);float glow=smoothstep(.5,0.,d)*.35*pu;float h=mod(time*.1,1.);float r=abs(h*6.-3.)-1.;float g=2.-abs(h*6.-2.);float b=2.-abs(h*6.-4.);gl_FragColor=vec4(clamp(vec3(r,g,b),0.,1.)*glow,glow);}`});
    this.el.setObject3D('mesh',new THREE.Mesh(new THREE.PlaneGeometry(1.3,1.3),mat));
    this.mat=mat;
  },
  tick(t){this.mat.uniforms.time.value=t/1000;}
});

AFRAME.registerComponent('waterfall-overlay',{
  init(){
    const mat=new THREE.ShaderMaterial({
      transparent:true,depthWrite:false,side:THREE.DoubleSide,
      uniforms:{time:{value:0}},
      vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`
        precision highp float;
        uniform float time;varying vec2 vUv;
        const float TAU=6.283185307;
        float ray_issphere4(vec3 ro,vec3 rd,float ra){
          float r2=ra*ra;vec3 d2=rd*rd,d3=d2*rd,o2=ro*ro,o3=o2*ro;
          float ka=1./dot(d2,d2),k3=ka*dot(ro,d3),k2=ka*dot(o2,d2),k1=ka*dot(o3,rd),k0=ka*(dot(o2,o2)-r2*r2),
                c2=k2-k3*k3,c1=k1+2.*k3*k3*k3-3.*k3*k2,c0=k0-3.*k3*k3*k3*k3+6.*k3*k3*k2-4.*k3*k1,
                p=c2*c2+c0/3.,q=c2*c2*c2-c2*c0+c1*c1,h=q*q-p*p*p;
          if(h<0.)return -1.;
          float sh=sqrt(h),s=sign(q+sh)*pow(abs(q+sh),1./3.),t=sign(q-sh)*pow(abs(q-sh),1./3.);
          vec2 w=vec2(s+t,s-t),v=vec2(w.x+c2*4.,w.y*sqrt(3.))*.5;float r=length(v);
          return abs(v.y)/sqrt(r+v.x)-c1/r-k3;
        }
        float hash(vec2 co){return fract(sin(dot(co,vec2(12.9898,58.233)))*13758.5453);}
        float hash1(float co){return fract(sin(co*12.9898)*13758.5453);}
        float dot2(vec2 p){return dot(p,p);}
        vec3 lines(vec3 F,vec3 P,float A,float AA,float T){
          const float N=4.;vec2 Z0=vec2(5e-3,TAU/6.),Z1=.2*Z0;
          for(float j=0.;j<N;++j){
            vec3 p=P;p.x+=Z0.x*j/N;
            float h0=hash(vec2(floor(p.x/Z0.x+.5),j)),h1=fract(8667.*h0),a=A-T*(1.+h0);
            vec2 q=vec2(p.x,a),n=floor(vec2(p.x,a)/Z0+.5),q0,q1,d;
            q-=n*Z0;q0=q-vec2(0.,Z1.y);q1=q;q1.y=max(abs(q1.y)-Z1.y,0.);
            d=vec2(length(q0),length(q1))-Z1.x;
            vec4 c=.5*(1.+sin(.1*T+TAU*h1+vec4(0.,1.,8.,4.)));vec3 b=c.xyz*c.w;
            F+=exp(19.*(q.y-Z1.y))*smoothstep(AA,-AA,d.y)*b;
            F+=smoothstep(AA,-AA,d.x-.5*Z1.x)*sqrt(.5*(b-min(0.,d.x-.5*Z1.x)));
          }
          return F;
        }
        vec3 stars(vec3 F,vec3 P,float A,float AA,float T){
          vec2 Z0=vec2(.1,TAU/6.);vec3 p=P;p.x+=.123;
          float h0=hash(vec2(floor(p.x/Z0.x+.5),0.)),h1=fract(8667.*h0),a=A-T*(1.5+h0);
          vec2 q=vec2(p.x,a),n=floor(vec2(p.x,a)/Z0+.5);q-=n*Z0;
          vec3 c=.5*(1.+sin(7.*T+TAU*h1+vec3(2.,1.,0.)))*hash1(.123*n.x+floor(T*121.));
          F+=c*7e-6/max(dot2(vec2(.001/.001,1.)*q),1e-6);return F;
        }
        void main(){
          vec2 C=vUv*vec2(800.,800.),R=vec2(800.,800.);
          vec3 RO=vec3(0.,-1.9,0.),RD=normalize(vec3(C-.5*R,sqrt(2.)*R.y));
          vec3 F=3e-4*vec3(1.,4.,40.)/(dot2(vec2(sqrt(.5),1.).yx*((C+C-R)/R.x-vec2(0.,R.y/R.x)))+2e-3);
          float Z=ray_issphere4(RO,RD,2.),T=.07*time+123.;
          vec3 P=Z*RD+RO;float A=atan(P.z,P.y),AA=.002;
          F=lines(F,P,A,AA,T);F=stars(F,P,A,AA,T);
          F*=4.;F-=2e-2*vec3(2.,3.,1.);F=tanh(F);F=max(F,0.);F=sqrt(F)-.05;
          float brightness=dot(F,vec3(.299,.587,.114));
          gl_FragColor=vec4(F,min(brightness*.9,0.85));
        }
      `
    });
    this.mat=mat;
    this.el.setObject3D('mesh',new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat));
  },
  tick(t){if(this.mat)this.mat.uniforms.time.value=t/1000;}
});

const sceneEl=document.getElementById('ar-scene');

sceneEl.addEventListener('arReady',()=>{
  document.getElementById('loader').classList.remove('active');
  document.getElementById('hint').classList.add('active');
});

sceneEl.addEventListener('targetFound',()=>{
  const f=document.getElementById('found-flash');
  f.classList.add('active');
  setTimeout(()=>f.classList.remove('active'),600);
  document.getElementById('hint').classList.remove('active');
});

sceneEl.addEventListener('targetLost',()=>{
  document.getElementById('hint').classList.add('active');
});

function startAR(){
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('loader').classList.add('active');
  document.getElementById('loader-bar').style.width='60%';
  sceneEl.systems['mindar-image-system'].start();
}
</script>
</body>
</html>
